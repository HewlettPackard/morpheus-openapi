put:
  summary: Attach existing storage volume
  description: This will attach an existing storage volume, optionally specifying the mount point (controller and unit number). Available for HVM only.
  operationId: attachServerVolume
  tags:
    - Storage
  parameters:
    - $ref: ../components/parameters/server-id-path.yaml
    - name: volumeId
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
            format: int64
            description: The `id` of the storage volume record.
            example: 1
          - type: string
            description: The `uuid` of the storage volume record.
            example: "170a7696-36a7-4800-91a6-1247e24b37e2"
      description: The `id` or `uuid` to identify the storage volume record.
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            mountPoint:
              type: object
              properties:
                controller:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                      description: The ID of the storage controller
                  required:
                    - id
                unitNumber:
                  type: string
                  description: The unit number for the disk (e.g., "3")
              required:
                - controller
                - unitNumber
            rootVolume:
              type: boolean
              description: Attach as root volume
          required:
            - mountPoint
        examples:
          Mount Point:
            value:
              $ref: ../components/examples/attachVolumeMountPoint.json
  responses:
    '200':
      description: Successful Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/200-success.yaml
          examples:
            Response:
              value:
                $ref: ../components/examples/success.json 
    '4XX':
      $ref: ../components/responses/4xx.yaml
    '5XX':
      $ref: ../components/responses/5xx.yaml