get:
  summary: Retrieves a specific Support Bundle
  description: |
    Retrieves a specific support bundle by ID.
  operationId: getSupportBundle
  tags:
    - Support Bundles
  parameters:
    - $ref: ../components/parameters/id-path.yaml
  responses:
    '200':
      description: Successful Request
      content:
        application/json:
          schema:
            type: object
            properties:
              supportBundle:
                $ref: ../components/schemas/supportBundle.yaml
    '4XX':
      $ref: ../components/responses/4xx.yaml
    '5XX':
      $ref: ../components/responses/5xx.yaml
delete:
  summary: Deletes a Support Bundle
  description: |
    Deletes a specific support bundle by ID.
  operationId: removeSupportBundle
  tags:
    - Support Bundles
  parameters:
    - $ref: ../components/parameters/id-path.yaml
  responses:
    '200':
      description: Successful Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/200-success.yaml
    '4XX':
      $ref: ../components/responses/4xx.yaml
    '5XX':
      $ref: ../components/responses/5xx.yaml
