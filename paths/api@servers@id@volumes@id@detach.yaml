put:
  summary: Detach storage volume
  description: This will detach a storage volume from the server. Available for HVM only.
  operationId: detachServerVolume
  tags:
    - Storage
  parameters:
    - $ref: ../components/parameters/server-id-path.yaml
    - name: volumeId
      in: path
      required: true
      schema:
        oneOf:
          - type: integer
            format: int64
            title: ID
            description: The `id` of the storage volume record.
            example: 1
          - type: string
            title: UUID
            description: The `uuid` of the storage volume record.
            example: "170a7696-36a7-4800-91a6-1247e24b37e2"
      description: The `id` or `uuid` to identify the storage volume record.
    - name: force
      in: query
      description: Force the detachment of the volume
      required: false
      schema:
        type: boolean
        default: false
  responses:
    '200':
      description: Successful Request
      content:
        application/json:
          schema:
            $ref: ../components/schemas/200-success.yaml
          examples:
            Response:
              value:
                $ref: ../components/examples/success.json 
    '4XX':
      $ref: ../components/responses/4xx.yaml
    '5XX':
      $ref: ../components/responses/5xx.yaml