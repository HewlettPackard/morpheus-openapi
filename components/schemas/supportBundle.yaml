type: object
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
  uuid:
    type: string
    format: uuid
  status:
    type: string
    description: The current status of the support bundle generation
    enum:
      - PENDING
      - IN_PROGRESS
      - CANCELLING
      - CANCELLED
      - COMPLETED
      - FAILED
  statusMessage:
    type:
      - string
      - "null"
  startedAt:
    type:
      - string
      - "null"
    format: date-time
  completedAt:
    type:
      - string
      - "null"
    format: date-time
  filePath:
    type:
      - string
      - "null"
    description: The file path / filename of the generated bundle archive
  contentLength:
    type:
      - integer
      - "null"
    format: int64
    description: File size in bytes
  contentType:
    type:
      - string
      - "null"
    description: MIME type of the bundle file
  checksum:
    type:
      - string
      - "null"
  storageProvider:
    type:
      - object
      - "null"
    description: The storage provider where the bundle was saved, if any
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  deliveryStatus:
    type:
      - string
      - "null"
    description: RDA delivery status (only present when Send to HPE is enabled)
    enum:
      - IN_PROGRESS
      - DELIVERED
      - FAILED
      - SUPERSEDED
  deliveredFilename:
    type:
      - string
      - "null"
    description: Filename of the CMB file delivered to HPE via rda-cas
