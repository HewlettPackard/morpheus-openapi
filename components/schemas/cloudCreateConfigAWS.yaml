description: Amazon Cloud
type: object
required:
  - endpoint
properties:
  applianceUrl:
    type: string
    description: The URL used by workloads provisioned in the cloud for interacting with the Morpheus appliance.
  datacenterName:
    type: string
    description: A custom name used to reference the datacenter for the cloud.
  externalId:
    type:
      - string
      - 'null'
    description: The external id of the cloud
  inventoryLevel:
    type: string
    enum:
      - off
      - basic
      - full
    description: Whether to import existing virtual machines.
  consoleKeymap:
    type: string
    description: The keyboard layout to use for the console
  endpoint:
    type: string
    description: AWS endpoint
    example: ec2.ca-central-1.amazonaws.com
  accessKey:
    type: string
    description: AWS access key
  secretKey:
    type: string
    description: AWS secret key
  useHostCredentials:
    type: string
    enum:
      - on
      - off
    description: Whether to use the IAM profile associated with the Morpheus server or not
    default: on
    example: on
  ebsEncryption:
    type: string
    enum:
      - on
      - off
    description: Determines whether to configure default EBS volume encryption or not
    default: on
    example: on
  stsAssumeRole:
    type: string
    description: The AWS IAM role ARN to assume for authentication
  configManagementId:
    type: string
    description: The id of the configuration management integration associated with the AWS cloud
  vpc:
    type: string
    description: The VPC ID for a specific VPC
    example: vpc-25e6dae
  vdiGateway:
    type: string
    description: The VDI gateway for this cloud to use for provisioning virtual desktops.
  cmdbConfig:
    type: string
    description: The CMDB configuration for this cloud to use for syncing with the CMDB.
  changeManagementConfig:
    type: string
    description: The change management configuration for this cloud to use for syncing with the change management system.
  NetworkMode:
    type: string
    enum:
      - 'null'
      - unmanaged
    description: Whether to use public or private IP addresses for provisioning and managing instances in this cloud.