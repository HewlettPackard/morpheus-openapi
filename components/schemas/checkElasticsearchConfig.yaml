title: Elastic Search Config
type: object
required:
  - esHost
  - esPort
properties: 
  esHost:
    type: string
    description: Hostname or IP address of the Elasticsearch server
    example: "test.example.org"
  esPort:
    type: string
    description: Port to connect to the HTTP service
    example: "9200"
  checkUser: 
    type: string
  textCheckOn: 
    type: string
  checkPassword: 
    type: string
  webTextMatch: 
    type: string
  checkPasswordHash: 
    type: string
