type: object
properties:
  name:
    type: string
    description: The name of the system.
    example: my-system
  description:
    type: string
    description: Optional description for the system.
    example: My system description
  type:
    type: object
    description: The system type. Required on create.
    properties:
      id:
        type: integer
        format: int64
        description: ID of the system type.
        example: 1
  layout:
    type: object
    description: The system type layout. Must belong to the selected type. Required on create.
    properties:
      id:
        type: integer
        format: int64
        description: ID of the system type layout.
        example: 1
  enabled:
    type: boolean
    description: Whether the system is enabled.
    example: true
  externalId:
    type: string
    description: External identifier for the system.
    example: ext-1234
  config:
    type: object
    description: Arbitrary configuration data for the system.
    additionalProperties: true
required:
  - name
  - type
  - layout
