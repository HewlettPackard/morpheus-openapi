type: object
additionalProperties: false
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
  description:
    type:
      - string
      - 'null'
  policyType:
    type: object
    properties:
      id:
        type: integer
        format: int64
      code:
        type: string
      name:
        type: string
  zone:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  site:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  user:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      username:
        type: string
  role:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      authority:
        type: string
  refType:
    type:
      - string
      - 'null'
  refId:
    type:
      - integer
      - 'null'
    format: int64
  eachUser:
    type:
      - boolean
      - 'null'
  config:
    oneOf:
      - type: object
        title: Approve Policy Type Configuration
        additionalProperties: false
        required:
          - accountIntegrationId
        description: |
          - Approve Delete
          - Approve Provision
          - Approve Reconfigure
        properties:
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          workflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Backup Creation Policy Type Configuration
        additionalProperties: false
        required:
          - createBackupType
        description: |
          - Backup Creation
        properties:
          createBackupType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          createBackup:
            type: boolean
            description: Enforce backup creation
      - type: object
        title: Backup Targets Policy Type Configuration
        additionalProperties: false
        required:
          - backupStorageIds
        description: |
          - Backup Targets
        properties:
          backupStorageIds:
            type: array
            description: Array of backup storage IDs to restrict available backup targets
            items:
              type: string
      - type: object
        title: Budget Policy Type Configuration
        additionalProperties: false
        required:
          - maxPrice
        description: |
          - Budget
        properties:
          maxPrice:
            type: number
            description: Maximum price limit
          maxPriceCurrency:
            type: string
            description: Currency code (e.g., USD)
          maxPriceUnit:
            type: string
            description: 'Options: "hour", "month"'
      - type: object
        title: Cluster Resource Name Policy Type Configuration
        additionalProperties: false
        required:
          - serverNamingType
        description: |
          - Cluster Resource Name
        properties:
          serverNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          serverNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation.  Available variables are:<br>groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          serverNamingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Cypher Access Policy Type Configuration
        additionalProperties: false
        required:
          - keyPattern
        description: |
          - Cypher Access
        properties:
          keyPattern:
            type: string
            description: 'Pattern to match Cypher keys (e.g., "secret/*", "password/*")'
          read:
            type: boolean
            description: Allow read access
          write:
            type: boolean
            description: Allow write access
          update:
            type: boolean
            description: Allow update access
          delete:
            type: boolean
            description: Allow delete access
          list:
            type: boolean
            description: Allow list access
      - type: object
        title: Delayed Delete Policy Type Configuration
        additionalProperties: false
        required:
          - removalAge
        description: |
          - Delayed Delete
        properties:
          removalAge:
            type: string
            description: Number of days to delay deletion
      - type: object
        title: Expiration Policy Type Configuration
        additionalProperties: false
        required:
          - lifecycleType
        description: |
          - Expiration
        properties:
          lifecycleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (fixed expiration)'
          lifecycleAge:
            type: string
            description: Days until expiration
          lifecycleRenewal:
            type: string
            description: Days for renewal window
          lifecycleNotify:
            type: string
            description: Days before expiration to notify
          lifecycleMessage:
            type: string
            description: Notification message
          lifecycleAutoRenew:
            $ref: checkbox.yaml
          lifecycleAllowExtend:
            $ref: checkbox.yaml
          lifecycleExtensionsBeforeApproval:
            type: string
            description: Number of extensions before requiring approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          lifecycleWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
          lifecycleHideFixed:
            type: boolean
            description: Hide fixed expiration from users
      - type: object
        title: Hostname Policy Type Configuration
        additionalProperties: false
        required:
          - hostNamingType
        description: |
          - Hostname
        properties:
          hostNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          hostNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation.  Available variables are:<br>groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
      - type: object
        title: Instance Name Policy Type Configuration
        additionalProperties: false
        required:
          - namingType
        description: |
          - Instance Name
        properties:
          namingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          namingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation.  Available variables are:<br>groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          namingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Max Containers Policy Type Configuration
        additionalProperties: false
        required:
          - maxContainers
        description: |
          - Max Containers
        properties:
          maxContainers:
            type: string
            description: Max Containers
      - type: object
        title: Max Cores Policy Type Configuration
        additionalProperties: false
        required:
          - maxCores
        description: |
          - Max Cores
        properties:
          maxCores:
            type: string
            description: Max Cores
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Hosts Policy Type Configuration
        additionalProperties: false
        required:
          - maxHosts
        description: |
          - Max Hosts
        properties:
          maxHosts:
            type: string
            description: Max Hosts
      - type: object
        title: Max Load Balancer Pools Policy Type Configuration
        additionalProperties: false
        required:
          - maxPools
        description: |
          - Max Load Balancer Pools
        properties:
          maxPools:
            type: string
            description: Max Pools
      - type: object
        title: Max Memory Policy Type Configuration
        additionalProperties: false
        required:
          - maxMemory
        description: |
          - Max Memory
        properties:
          maxMemory:
            type: string
            description: Max Memory (GB)
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Pool Members Policy Type Configuration
        additionalProperties: false
        required:
          - maxPoolMembers
        description: |
          - Max Pool Members
        properties:
          maxPoolMembers:
            type: string
            description: Max Pool Members
      - type: object
        title: Max Snapshots Policy Type Configuration
        additionalProperties: false
        required:
          - maxSnapshots
        description: |
          - Max Snapshots
        properties:
          maxSnapshots:
            type: string
            description: Max Snapshots
      - type: object
        title: Max Storage and Object Storage Quota Policy Type Configuration
        additionalProperties: false
        required:
          - maxStorage
        description: |
          - Max Storage
          - Object Storage Quota
          - File Share Storage Quota
        properties:
          maxStorage:
            type: string
            description: Max Storage (GB)
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Virtual Servers Policy Type Configuration
        additionalProperties: false
        required:
          - maxVirtualServers
        description: |
          - Max Virtual Servers
        properties:
          maxVirtualServers:
            type: string
            description: Max Virtual Servers
      - type: object
        title: Max VMs Policy Type Configuration
        additionalProperties: false
        required:
          - maxVms
        description: |
          - Max VMs
        properties:
          maxVms:
            type: string
            description: Max VMs
      - type: object
        title: Message of the Day Policy Type Configuration
        additionalProperties: false
        required:
          - motd
        description: |
          - Message of the Day
        properties:
          motd.title:
            type:
              - string
              - 'null'
            description: Message title
          motd:
            type: object
            properties:
              title:
                type: string
              message:
                type: string
              type:
                type: string
              fullPage:
                oneOf:
                  - type: string
                    enum:
                      - "on"
                      - "off"
                      - ""
                  - type: 'null'
          motd.message:
            type: string
            description: Message content
          motd.type:
            type: string
            description: 'Options: "info", "warning", "critical"'
          motd.fullPage:
            oneOf:
              - type: string
                enum:
                  - "on"
                  - "off"
                  - ""
              - type: 'null'
            description: Display full page
          motd.date:
            type: string
            description: Display date for message
      - type: object
        title: Network Quota Policy Type Configuration
        additionalProperties: false
        required:
          - maxNetworks
        description: |
          - Network Quota
        properties:
          maxNetworks:
            type: string
            description: Max Networks
      - type: object
        title: Power Schedule Policy Type Configuration
        additionalProperties: false
        required:
          - powerScheduleType
        description: |
          - Power Schedule
        properties:
          powerScheduleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict schedule)'
          powerSchedule:
            type: string
            description: ID of the power schedule
          powerScheduleHideFixed:
            type: boolean
            description: Hide fixed schedule from users
      - type: object
        title: Router Quota Policy Type Configuration
        additionalProperties: false
        required:
          - maxRouters
        description: |
          - Router Quota
        properties:
          maxRouters:
            type: string
            description: Max Routers
      - type: object
        title: Required Network Policy Type Configuration
        additionalProperties: false
        required:
          - requiredNetworks
        description: |
          - Instance Networks
        properties:
          requiredNetworks:
            type: array
            description: Array of required network IDs
            items:
              type: integer
              format: int64
      - type: object
        title: Shutdown Policy Type Configuration
        additionalProperties: false
        required:
          - shutdownType
        description: |
          - Shutdown
        properties:
          shutdownType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict shutdown)'
          shutdownAge:
            type: string
            description: Days instance is allowed to run before shutdown
          shutdownRenewal:
            type: string
            description: If the instance is renewed, this is the number of day increments the shutdown date is increased by
          shutdownNotify:
            type: string
            description: Days before shutdown to notify via email
          shutdownMessage:
            type: string
            description: Notification message
          shutdownAutoRenew:
            $ref: checkbox.yaml
          shutdownAllowExtend:
            $ref: checkbox.yaml
          shutdownExtensionsBeforeApproval:
            type: string
            description: Number of extensions before requiring approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          shutdownHideFixed:
            type: boolean
            description: Hide fixed shutdown from users
          shutdownWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Storage Server Storage Quota Policy Type Configuration
        additionalProperties: false
        required:
          - storageServerId
        description: |
          - Storage Server Storage Quota
        properties:
          storageServerId:
            type: string
            description: ID of the storage server
          maxStorage:
            type: string
            description: Max Storage (GB)
      - type: object
        title: Tags Policy Type Configuration
        additionalProperties: false
        required:
          - strict
        description: |
          - Tags
        properties:
          strict:
            type: boolean
            description: Strict enforcement
          key:
            type: string
            description: Tag key to enforce
          valueListId:
            type: string
            description: ID of value from value list (optional)
          value:
            type: string
            description: Tag value (optional, can be left empty for any value)
      - type: object
        title: User Creation Policy Type Configuration
        additionalProperties: false
        required:
          - createUserType
        description: |
          - User Creation
        properties:
          createUserType:
            type: string
            description: 'Options: "user" (user configurable), "fixed"'
          createUser:
            type: boolean
            description: Enforce user creation
      - type: object
        title: User Group Creation Policy Type Configuration
        additionalProperties: false
        required:
          - userGroup
        description: |
          - User Group Creation
        properties:
          userGroup:
            type: string
            description: ID of the user group to assign
      - type: object
        title: Workflow Policy Type Configuration
        additionalProperties: false
        required:
          - workflowId
        description: |
          - Workflow
        properties:
          workflowId:
            type: string
            description: ID of the workflow to execute
  enabled:
    type: boolean
  owner:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  accounts:
    type:
      - array
      - 'null'
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
