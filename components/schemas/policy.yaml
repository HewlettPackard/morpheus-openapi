type: object
additionalProperties: false
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
  description:
    type:
      - string
      - 'null'
  policyType:
    type: object
    properties:
      id:
        type: integer
        format: int64
      code:
        type: string
      name:
        type: string
  zone:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  site:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  user:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      username:
        type: string
  role:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      authority:
        type: string
  refType:
    type:
      - string
      - 'null'
  refId:
    type:
      - integer
      - 'null'
    format: int64
  eachUser:
    type:
      - boolean
      - 'null'
  config:
    oneOf:
      - type: object
        title: Approve Policy Type Configuration
        additionalProperties: false
        description: |
          - Approve Delete
          - Approve Provision
          - Approve Reconfigure
        properties:
          accountIntegrationId:
            type: string
          workflowId:
            type: string
          flowId:
            type: string
          workflowType:
            type: string
      - type: object
        title: Backup Creation Policy Type Configuration
        additionalProperties: false
        description: |
          - Backup Creation
        properties:
          createBackupType:
            type: string
          createBackup:
            type: boolean
      - type: object
        title: Backup Targets Policy Type Configuration
        additionalProperties: false
        description: |
          - Backup Targets
        properties:
          backupStorageIds:
            type: array
            items:
              type: string
      - type: object
        title: Budget Policy Type Configuration
        additionalProperties: false
        description: |
          - Budget
        properties:
          maxPrice:
            type: string
          maxPriceCurrency:
            type: string
          maxPriceUnit:
            type: string
      - type: object
        title: Cluster Resource Name Policy Type Configuration
        additionalProperties: false
        description: |
          - Cluster Resource Name
        properties:
          serverNamingType:
            type: string
          serverNamingPattern:
            type: string
          serverNamingConflict:
            type: boolean
      - type: object
        title: Cypher Access Policy Type Configuration
        additionalProperties: false
        description: |
          - Cypher Access
        properties:
          keyPattern:
            type: string
          read:
            type: boolean
          write:
            type: boolean
          update:
            type: boolean
          delete:
            type: boolean
          list:
            type: boolean
      - type: object
        title: Delayed Delete Policy Type Configuration
        additionalProperties: false
        description: |
          - Delayed Delete
        properties:
          removalAge:
            type: string
      - type: object
        title: Expiration Policy Type Configuration
        additionalProperties: false
        description: |
          - Expiration
        properties:
          lifecycleType:
            type: string
          lifecycleAge:
            type: string
          lifecycleRenewal:
            type: string
          lifecycleNotify:
            type: string
          lifecycleMessage:
            type: string
          lifecycleAutoRenew:
            $ref: checkbox.yaml
          lifecycleAllowExtend:
            $ref: checkbox.yaml
          lifecycleExtensionsBeforeApproval:
            type: string
          accountIntegrationId:
            type: string
          lifecycleWorkflowId:
            type: string
          flowId:
            type: string
          workflowType:
            type: string
          lifecycleHideFixed:
            type: boolean
      - type: object
        title: Hostname Policy Type Configuration
        additionalProperties: false
        description: |
          - Hostname
        properties:
          hostNamingType:
            type: string
          hostNamingPattern:
            type: string
      - type: object
        title: Instance Name Policy Type Configuration
        additionalProperties: false
        description: |
          - Instance Name
        properties:
          namingType:
            type: string
          namingPattern:
            type: string
          namingConflict:
            type: boolean
      - type: object
        title: Max Containers Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Containers
        properties:
          maxContainers:
            type: string
      - type: object
        title: Max Cores Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Cores
        properties:
          maxCores:
            type: string
          excludeContainers:
            $ref: checkbox.yaml
      - type: object
        title: Max Hosts Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Hosts
        properties:
          maxHosts:
            type: string
      - type: object
        title: Max Load Balancer Pools Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Load Balancer Pools
        properties:
          maxPools:
            type: string
      - type: object
        title: Max Memory Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Memory
        properties:
          maxMemory:
            type: string
          excludeContainers:
            $ref: checkbox.yaml
      - type: object
        title: Max Pool Members Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Pool Members
        properties:
          maxPoolMembers:
            type: string
      - type: object
        title: Max Snapshots Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Snapshots
        properties:
          maxSnapshots:
            type: string
      - type: object
        title: Max Storage and Object Storage Quota Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Storage
          - Object Storage Quota
          - File Share Storage Quota
        properties:
          maxStorage:
            type: string
          excludeContainers:
            $ref: checkbox.yaml
      - type: object
        title: Max Virtual Servers Policy Type Configuration
        additionalProperties: false
        description: |
          - Max Virtual Servers
        properties:
          maxVirtualServers:
            type: string
      - type: object
        title: Max VMs Policy Type Configuration
        additionalProperties: false
        description: |
          - Max VMs
        properties:
          maxVms:
            type: string
      - type: object
        title: Message of the Day Policy Type Configuration
        additionalProperties: false
        description: |
          - Message of the Day
        properties:
          motd.title:
            type:
              - string
              - 'null'
          motd:
            type: object
            properties:
              title:
                type: string
              message:
                type: string
              type:
                type: string
              fullPage:
                oneOf:
                  - type: string
                    enum:
                      - "on"
                      - "off"
                      - ""
                  - type: 'null'
          motd.message:
            type: string
          motd.type:
            type: string
          motd.fullPage:
            oneOf:
              - type: string
                enum:
                  - "on"
                  - "off"
                  - ""
              - type: 'null'
          motd.date:
            type: string
      - type: object
        title: Network Quota Policy Type Configuration
        additionalProperties: false
        description: |
          - Network Quota
        properties:
          maxNetworks:
            type: string
      - type: object
        title: Power Schedule Policy Type Configuration
        additionalProperties: false
        description: |
          - Power Schedule
        properties:
          powerScheduleType:
            type: string
          powerSchedule:
            type: string
          powerScheduleHideFixed:
            type: boolean
      - type: object
        title: Router Quota Policy Type Configuration
        additionalProperties: false
        description: |
          - Router Quota
        properties:
          maxRouters:
            type: string
      - type: object
        title: Required Network Policy Type Configuration
        additionalProperties: false
        description: |
          - Instance Networks
        properties:
          requiredNetworks:
            type: array
            items:
              type: integer
              format: int64
      - type: object
        title: Shutdown Policy Type Configuration
        additionalProperties: false
        description: |
          - Shutdown
        properties:
          shutdownType:
            type: string
          shutdownAge:
            type: string
          shutdownRenewal:
            type: string
          shutdownNotify:
            type: string
          shutdownMessage:
            type: string
          shutdownAutoRenew:
            $ref: checkbox.yaml
          shutdownAllowExtend:
            $ref: checkbox.yaml
          shutdownExtensionsBeforeApproval:
            type: string
          accountIntegrationId:
            type: string
          shutdownHideFixed:
            type: boolean
          shutdownWorkflowId:
            type: string
          flowId:
            type: string
          workflowType:
            type: string
      - type: object
        title: Storage Server Storage Quota Policy Type Configuration
        additionalProperties: false
        description: |
          - Storage Server Storage Quota
        properties:
          storageServerId:
            type: string
          maxStorage:
            type: string
      - type: object
        title: Tags Policy Type Configuration
        additionalProperties: false
        description: |
          - Tags
        properties:
          strict:
            type: boolean
          key:
            type: string
          valueListId:
            type: string
          value:
            type: string
      - type: object
        title: User Creation Policy Type Configuration
        additionalProperties: false
        description: |
          - User Creation
        properties:
          createUserType:
            type: string
          createUser:
            type: boolean
      - type: object
        title: User Group Creation Policy Type Configuration
        additionalProperties: false
        description: |
          - User Group Creation
        properties:
          userGroup:
            type: string
      - type: object
        title: Workflow Policy Type Configuration
        additionalProperties: false
        description: |
          - Workflow
        properties:
          workflowId:
            type: string
  enabled:
    type: boolean
  owner:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  accounts:
    type:
      - array
      - 'null'
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
