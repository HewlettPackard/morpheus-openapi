type: object
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
    description: Name
  affinityType:
    type: string
    description: Affinity Type
    enum:
      - KEEP_TOGETHER
      - KEEP_SEPARATE
  active:
    type: boolean
    description: Active
  pool:
    type: object
    properties:
      id:
        type: integer
        format: int64
    description: Resource Pool ID to scope the Affinity Group to
  servers:
    type: array
    items:
      type: integer
    description: List of Server IDs to include in the Affinity Group
  visibility:
    $ref: visibility.yaml
  tenants:
    type: array
    description: Array of tenant account ids that are allowed access
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
  resourcePermissions:
    type: object
    description: Resource Permissions for controlling Group Access
    properties:
      all:
        type: boolean
      sites:
        type:
          - array
          - 'null'
        items:
          type: object