type: object
description: AlletraMP HVM Datastore Configuration
properties:
  enableRansomware:
    type: boolean
    description: Enable ransomware protection for this datastore
  protocolType:
    type: string
    description: Storage protocol to use, can be 'iSCSI' or 'FC'
    enum:
      - iSCSI
      - FC
required:
  - protocolType
  - enableRansomware