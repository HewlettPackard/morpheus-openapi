type: object
required:
  - name
  - policyType
  - config
properties:
  name:
    type: string
    description: A name for the policy
    example: Sample Policy
  description:
    type: string
    description: A description for the policy
  policyType:
    type: object
    properties:
      code:
        type: string
        description: The policy type code. See `Retrieves all Policy Types` endpoint for listing.
        enum:
          - deleteApproval
          - provisionApproval
          - reconfigureApproval
          - workflowApproval
          - createBackup
          - backupStorage
          - maxPrice
          - serverNaming
          - cypher
          - delayedRemoval
          - lifecycle
          - storageShareQuota
          - hostNaming
          - naming
          - maxContainers
          - maxCores
          - maxHosts
          - maxPools
          - maxMemory
          - maxPoolMembers
          - maxSnapshots
          - maxStorage
          - maxVirtualServers
          - maxVms
          - motd
          - maxNetworks
          - storageBucketQuota
          - powerSchedule
          - requiredNetwork
          - maxRouters
          - shutdown
          - storageServerQuota
          - tags
          - createUser
          - createUserGroup
          - workflow
  config:
    description: A map of config values. The expected values vary by policy type. See `Retrieves all Policy Types` endpoint for `fieldName`(s) of required options.
    anyOf:
      - type: object
        title: Approve Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Approve Delete
          - Approve Provision
          - Approve Reconfigure
        properties:
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          workflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Backup Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Backup Creation
        properties:
          createBackupType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          createBackup:
            type: boolean
            description: Enforce backup creation
      - type: object
        title: Backup Targets Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Backup Targets
        properties:
          backupStorageIds:
            type: array
            description: Array of backup storage IDs to restrict available backup targets
            items:
              type: integer
              format: int64
      - type: object
        title: Budget Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Budget
        properties:
          maxPrice:
            type: number
            description: Maximum price limit
          maxPriceCurrency:
            type: string
            description: Currency code (e.g., USD)
          maxPriceUnit:
            type: string
            description: 'Options: "hour", "month"'
      - type: object
        title: Cluster Resource Name Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Cluster Resource Name
        properties:
          serverNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          serverNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          serverNamingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Cypher Access Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Cypher Access
        properties:
          keyPattern:
            type: string
            description: 'Pattern to match Cypher keys (e.g., "secret/*", "password/*")'
          read:
            type: boolean
            description: Allow read access
          write:
            type: boolean
            description: Allow write access
          update:
            type: boolean
            description: Allow update access
          delete:
            type: boolean
            description: Allow delete access
          list:
            type: boolean
            description: Allow list access
      - type: object
        title: Delayed Delete Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Delayed Delete
        properties:
          removalAge:
            type: string
            description: Removal Age (days)
      - type: object
        title: Expiration Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Expiration
        properties:
          lifecycleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (fixed expiration)'
          lifecycleAge:
            type: string
            description: Lifecycle Age (days)
          lifecycleRenewal:
            type: string
            description: Renewal Days
          lifecycleNotify:
            type: string
            description: Notification Days
          lifecycleMessage:
            type: string
            description: Notification message
          lifecycleAutoRenew:
            $ref: checkbox.yaml
          lifecycleAllowExtend:
            $ref: checkbox.yaml
          lifecycleExtensionsBeforeApproval:
            type: string
            description: Extensions Before Approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          lifecycleHideFixed:
            type: boolean
            description: Hide fixed expiration from users
          lifecycleWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: File Share Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - File Share Storage Quota
        properties:
          maxStorage:
            type: string
            description: Max Storage (GB)
      - type: object
        title: Hostname Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Hostname
        properties:
          hostNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          hostNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
      - type: object
        title: Instance Name Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Instance Name
        properties:
          namingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          namingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          namingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Max Containers Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Containers
        properties:
          maxContainers:
            type: string
            description: Max Containers
      - type: object
        title: Max Cores Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Cores
        properties:
          maxCores:
            type: string
            description: Max Cores
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Hosts Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Hosts
        properties:
          maxHosts:
            type: string
            description: Max Hosts
      - type: object
        title: Max Load Balancer Pools Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Load Balancer Pools
        properties:
          maxPools:
            type: string
            description: Max Pools
      - type: object
        title: Max Memory Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Memory
        required:
          - maxMemory
        properties:
          maxMemory:
            anyOf:
              - type: string
              - type: integer
                format: int64
            description: Max Memory (GB)
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Pool Members Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Pool Members
        properties:
          maxPoolMembers:
            type: string
            description: Max Pool Members
      - type: object
        title: Max Snapshots Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Snapshots
        properties:
          maxSnapshots:
            type: string
            description: Max Snapshots
      - type: object
        title: Max Storage and Object Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Storage
          - Object Storage Quota
        properties:
          maxStorage:
            type: string
            description: Max Storage (GB)
          excludeContainers:
            $ref: checkbox.yaml
            description: 'Exclude containers from count'
      - type: object
        title: Max Virtual Servers Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Virtual Servers
        properties:
          maxVirtualServers:
            type: string
            description: Max Virtual Servers
      - type: object
        title: Max VMs Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max VMs
        properties:
          maxVms:
            type: string
            description: Max VMs
      - type: object
        title: Message of the Day Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Message of the Day
        properties:
          motd.title:
            type: string
            description: Message title
          motd:
            type: object
            properties:
              title:
                type: string
                description: Message title
              message:
                type: string
                description: Message content
              type:
                type: string
                description: 'Options: "info", "warning", "critical"'
              fullPage:
                type:
                  - boolean
                  - 'null'
                description: Display full page
          motd.message:
            type: string
            description: Message content
          motd.type:
            type: string
            description: 'Options: "info", "warning", "critical"'
          motd.fullPage:
            type:
              - boolean
              - 'null'
            description: Display full page
          motd.date:
            type: string
            description: Display date for message
      - type: object
        title: Network Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Network Quota
        properties:
          maxNetworks:
            type: string
            description: Max Networks
      - type: object
        title: Power Schedule Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Power Schedule
        properties:
          powerScheduleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict schedule)'
          powerSchedule:
            type: string
            description: ID of the power schedule
          powerScheduleHideFixed:
            type: boolean
            description: Hide fixed schedule from users
      - type: object
        title: Router Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Router Quota
        properties:
          maxRouters:
            type: string
            description: Max Routers
      - type: object
        title: Required Network Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Instance Networks
        properties:
          requiredNetworks:
            type: array
            description: Array of network IDs that are required
            items:
              type: integer
              format: int64
      - type: object
        title: Shutdown Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Shutdown
        properties:
          shutdownType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict shutdown)'
          shutdownAge:
            type: string
            description: Shutdown Age (days)
          shutdownRenewal:
            type: string
            description: Renewal Days
          shutdownNotify:
            type: string
            description: Notification Days
          shutdownMessage:
            type: string
            description: Notification message
          shutdownAutoRenew:
            $ref: checkbox.yaml
          shutdownAllowExtend:
            $ref: checkbox.yaml
          shutdownExtensionsBeforeApproval:
            type: string
            description: Extensions Before Approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          shutdownHideFixed:
            type: boolean
            description: Hide fixed shutdown from users
          shutdownWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Storage Server Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Storage Server Storage Quota
        properties:
          storageServerId:
            type: string
            description: ID of the storage server
          maxStorage:
            type: string
            description: Max Storage (GB)
      - type: object
        title: Tags Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Tags
        properties:
          strict:
            type: boolean
            description: Strict enforcement
          key:
            type: string
            description: Tag key to enforce
          valueListId:
            type: string
            description: ID of value from value list (optional)
          value:
            type: string
            description: Tag value (optional, can be left empty for any value)
      - type: object
        title: User Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - User Creation
        properties:
          createUserType:
            type: string
            description: 'Options: "user" (user configurable), "fixed"'
          createUser:
            type: boolean
            description: Enforce user creation
      - type: object
        title: User Group Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - User Group Creation
        properties:
          userGroup:
            type: string
            description: ID of the user group to assign
      - type: object
        title: Workflow Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Workflow
        properties:
          workflowId:
            type: string
            description: ID of the workflow to execute
  enabled:
    type: boolean
    description: Set to false to disable
    default: true
  refType:
    description: Scope object type.  If none specified, will default to Global (null)
    oneOf:
      - type: string
        enum:
          - ComputeSite
          - ComputeZone
          - User
          - Role
          - Network
          - Plan
      - type: 'null'
  refId:
    type: integer
    format: int64
    description: Scope object ID (`group`,`cloud`,`user`, etc)
  accounts:
    type: array
    description: Array of tenants to scope the policy to
    items:
      type: integer
      format: int64
  eachUser:
    type: boolean
    description: Apply individually to each user in role.  Only when `refType` equals `Role`
