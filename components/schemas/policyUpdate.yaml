type: object
properties:
  name:
    type: string
    description: A name for the policy
    example: Sample Policy
  description:
    type: string
    description: A description for the policy
  config:
    description: A map of config values. The expected values vary by policy type. See `Retrieves all Policy Types` endpoint for `fieldName`(s) of required options.
    anyOf:
      - type: object
        title: Approve Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Approve Delete
          - Approve Provision
          - Approve Reconfigure
        required:
          - accountIntegrationId
        properties:
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          workflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Backup Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Backup Creation
        required:
          - createBackupType
        properties:
          createBackupType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          createBackup:
            type: boolean
            description: Enforce backup creation
      - type: object
        title: Backup Targets Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Backup Targets
        required:
          - backupStorageIds
        properties:
          backupStorageIds:
            type: array
            description: Array of backup storage IDs to restrict available backup targets
            items:
              type: integer
              format: int64
      - type: object
        title: Budget Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Budget
        required:
          - maxPrice
        properties:
          maxPrice:
            type: number
            description: Maximum price limit
          maxPriceCurrency:
            type: string
            description: Currency code (e.g., USD)
          maxPriceUnit:
            type: string
            description: 'Options: "hour", "month"'
      - type: object
        title: Cluster Resource Name Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Cluster Resource Name
        required:
          - serverNamingType
        properties:
          serverNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          serverNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          serverNamingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Cypher Access Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Cypher Access
        required:
          - keyPattern
        properties:
          keyPattern:
            type: string
            description: 'Pattern to match Cypher keys (e.g., "secret/*", "password/*")'
          read:
            type: boolean
            description: Allow read access
          write:
            type: boolean
            description: Allow write access
          update:
            type: boolean
            description: Allow update access
          delete:
            type: boolean
            description: Allow delete access
          list:
            type: boolean
            description: Allow list access
      - type: object
        title: Delayed Delete Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Delayed Delete
        required:
          - removalAge
        properties:
          removalAge:
            type: string
            description: Number of days to delay deletion
      - type: object
        title: Expiration Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Expiration
        required:
          - lifecycleType
        properties:
          lifecycleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (fixed expiration)'
          lifecycleAge:
            type: string
            description: Days until expiration
          lifecycleRenewal:
            type: string
            description: Days for renewal window
          lifecycleNotify:
            type: string
            description: Days before expiration to notify
          lifecycleMessage:
            type: string
            description: Notification message
          lifecycleAutoRenew:
            $ref: checkbox.yaml
          lifecycleAllowExtend:
            $ref: checkbox.yaml
          lifecycleExtensionsBeforeApproval:
            type: string
            description: Number of extensions before requiring approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          lifecycleHideFixed:
            type: boolean
            description: Hide fixed expiration from users
          lifecycleWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: File Share Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - File Share Storage Quota
        required:
          - maxStorage
        properties:
          maxStorage:
            type: string
            description: Max Storage (GB)
      - type: object
        title: Hostname Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Hostname
        required:
          - hostNamingType
        properties:
          hostNamingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          hostNamingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
      - type: object
        title: Instance Name Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Instance Name
        required:
          - namingType
        properties:
          namingType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict pattern)'
          namingPattern:
            type: string
            description: 'Name pattern uses ${variable} string interpolation. Available variables are: groupName, groupCode, cloudName, cloudCode, type, accountId, account, accountType, platform, username, userId, userInitials, provisionType'
          namingConflict:
            type: boolean
            description: Auto-resolve conflicts
      - type: object
        title: Max Containers Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Containers
        required:
          - maxContainers
        properties:
          maxContainers:
            type: string
            description: Max Containers
      - type: object
        title: Max Cores Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Cores
        required:
          - maxCores
        properties:
          maxCores:
            type: string
            description: Max Cores
          excludeContainers:
            type: boolean
            description: 'Exclude containers from count'
      - type: object
        title: Max Hosts Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Hosts
        required:
          - maxHosts
        properties:
          maxHosts:
            type: string
            description: Max Hosts
      - type: object
        title: Max Load Balancer Pools Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Load Balancer Pools
        required:
          - maxPools
        properties:
          maxPools:
            type: string
            description: Max Pools
      - type: object
        title: Max Memory Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Memory
        required:
          - maxMemory
        properties:
          maxMemory:
            anyOf:
              - type: string
              - type: integer
                format: int64
            description: Max Memory (GB)
          excludeContainers:
            type: string
            description: 'Exclude containers from count'
            enum:
              - "on"
              - "off"
            default: "off"
      - type: object
        title: Max Pool Members Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Pool Members
        required:
          - maxPoolMembers
        properties:
          maxPoolMembers:
            type: string
            description: Max Pool Members
      - type: object
        title: Max Snapshots Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Snapshots
        required:
          - maxSnapshots
        properties:
          maxSnapshots:
            type: string
            description: Max Snapshots
      - type: object
        title: Max Storage and Object Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Storage
          - Object Storage Quota
        required:
          - maxStorage
        properties:
          maxStorage:
            type: string
            description: Max Storage (GB)
          excludeContainers:
            type: boolean
            description: 'Exclude containers from count'
      - type: object
        title: Max Virtual Servers Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max Virtual Servers
        required:
          - maxVirtualServers
        properties:
          maxVirtualServers:
            type: string
            description: Max Virtual Servers
      - type: object
        title: Max VMs Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Max VMs
        required:
          - maxVms
        properties:
          maxVms:
            type: string
            description: Max VMs
      - type: object
        title: Message of the Day Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Message of the Day
        required:
          - motd
        properties:
          motd.title:
            type: string
            description: Message title
          motd:
            type: object
            properties:
              title:
                type: string
                description: Message title
              message:
                type: string
                description: Message content
              type:
                type: string
                description: 'Options: "info", "warning", "critical"'
              fullPage:
                type:
                  - boolean
                  - 'null'
                description: Display full page
          motd.message:
            type: string
            description: Message content
          motd.type:
            type: string
            description: 'Options: "info", "warning", "critical"'
          motd.fullPage:
            type:
              - boolean
              - 'null'
            description: Display full page
          motd.date:
            type: string
            description: Display date for message
      - type: object
        title: Network Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Network Quota
        required:
          - maxNetworks
        properties:
          maxNetworks:
            type: string
            description: Max Networks
      - type: object
        title: Power Schedule Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Power Schedule
        required:
          - powerScheduleType
        properties:
          powerScheduleType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict schedule)'
          powerSchedule:
            type: string
            description: ID of the power schedule
          powerScheduleHideFixed:
            type: boolean
            description: Hide fixed schedule from users
      - type: object
        title: Router Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Router Quota
        required:
          - maxRouters
        properties:
          maxRouters:
            type: string
            description: Max Routers
      - type: object
        title: Required Network Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Instance Networks
        required:
          - requiredNetworks
        properties:
          requiredNetworks:
            type: array
            description: Array of network IDs that are required
            items:
              type: integer
              format: int64
      - type: object
        title: Shutdown Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Shutdown
        required:
          - shutdownType
        properties:
          shutdownType:
            type: string
            description: 'Options: "user" (user configurable), "fixed" (strict shutdown)'
          shutdownAge:
            type: string
            description: Days instance is allowed to run before shutdown
          shutdownRenewal:
            type: string
            description: If the instance is renewed, this is the number of day increments the shutdown date is increased by
          shutdownNotify:
            type: string
            description: Days before shutdown to notify via email
          shutdownMessage:
            type: string
            description: Notification message
          shutdownAutoRenew:
            $ref: checkbox.yaml
          shutdownAllowExtend:
            $ref: checkbox.yaml
          shutdownExtensionsBeforeApproval:
            type: string
            description: Number of extensions before requiring approval
          accountIntegrationId:
            type: string
            description: ID of your ServiceNow or approval integration
          shutdownHideFixed:
            type: boolean
            description: Hide fixed shutdown from users
          shutdownWorkflowId:
            type: string
            description: ID of legacy ServiceNow workflow (set if workflowType is 'workflow')
          flowId:
            type: string
            description: ID of ServiceNow Flow (set if workflowType is 'flow')
          workflowType:
            type: string
            description: 'Options: "workflow" (legacy workflow), "flow" (ServiceNow Flow)'
      - type: object
        title: Storage Server Storage Quota Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Storage Server Storage Quota
        required:
          - storageServerId
        properties:
          storageServerId:
            type: string
            description: ID of the storage server
          maxStorage:
            type: string
            description: Max Storage (GB)
      - type: object
        title: Tags Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Tags
        required:
          - strict
        properties:
          strict:
            type: boolean
            description: Strict enforcement
          key:
            type: string
            description: Tag key to enforce
          valueListId:
            type: string
            description: ID of value from value list (optional)
          value:
            type: string
            description: Tag value (optional, can be left empty for any value)
      - type: object
        title: User Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - User Creation
        required:
          - createUserType
        properties:
          createUserType:
            type: string
            description: 'Options: "user" (user configurable), "fixed"'
          createUser:
            type: boolean
            description: Enforce user creation
      - type: object
        title: User Group Creation Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - User Group Creation
        required:
          - userGroup
        properties:
          userGroup:
            type: string
            description: ID of the user group to assign
      - type: object
        title: Workflow Policy Type Configuration
        description: |
          Configuration settings for the following policy types:
          - Workflow
        required:
          - workflowId
        properties:
          workflowId:
            type: string
            description: ID of the workflow to execute
  enabled:
    type: boolean
    description: Set to false to disable
    default: true
  refType:
    type: string
    description: Scope object type
    enum:
      - ComputeSite
      - ComputeZone
      - User
      - Role
      - Network
      - Plan
  refId:
    type: integer
    format: int64
    description: Scope object ID (`group`,`cloud`,`user`, etc)
  accounts:
    type: array
    description: Array of tenants to scope the policy to
    items:
      type: integer
      format: int64
  eachUser:
    type: boolean
    description: Apply individually to each user in role.  Only when `refType` equals `Role`
