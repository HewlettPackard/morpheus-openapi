type: object
required: 
  - name
  - leaseTime
  - serverIpAddress
  - config
properties:
  serverIpAddress:
    type: string
    description: Server Address for the DHCP Server
  leaseTime:
    type: integer
    format: int64
    description: Optional lease time for the DHCP Server
    default: 86400
  name:
    type: string
    description: Name
  config:
    type: object
    description: Configuration object with parameters that vary by type.
    anyOf:
      - $ref: networkDhcpServerConfigNSX.yaml
      - $ref: networkDhcpServerConfigGeneric.yaml
