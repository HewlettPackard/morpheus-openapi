type: object
required: 
  - type
  - name
  - group
  - cloud
  - layout
  - server
properties: 
  type: 
    oneOf:
      - type: string
        description: Code of type of cluster to be created
      - type: object
        properties: 
          id:
            type: integer
            format: int64
            description: The type ID of cluster to be created
  name: 
    type: string
    description: Name of the cluster to be created
  description: 
    type: string
    description: Description of the cluster to be created
  labels: 
    type: array
    description: Array of strings (keywords). This will override labels passed under the `server` object.
    items: 
      type: string
  group: 
    type: object
    properties: 
      id: 
        type: integer
        format: int64
        description: The Group ID to provision the cluster into
  cloud: 
    type: object
    properties: 
      id: 
        type: integer
        format: int64
        description: The Cloud ID to provision the host into
  config:
    type: object
    description: Additional configuration for specific cluster types
    properties:
      templateParameter:
        type: object
        description: Configuration settings for the ARM Template when creating an Azure Kubernetes Service (AKS) cluster
        properties:
          dnsPrefix:
            type: string
            description: Optional DNS prefix to use with hosted Kubernetes API server FQDN.
          onDiskSizeGB:
            type: integer
            format: int64
            description: Disk size (in GB) to provision for each of the agent pool nodes. This value ranges from 0 to 1023. Specifying 0 will apply the default disk size for that agentVMSize.
          nodeVMSize:
            type: integer
            format: int64
            description: The size of the Virtual Machine.
          vnetSubnetID:
            type: string
            description: Resource ID of virtual network subnet used for nodes and/or pods IP assignment.
          serviceCidr:
            type: string
            description: A CIDR notation IP range from which to assign service cluster IPs.
          dnsServiceIP:
            type: string
            description: Containers DNS server IP address.
          dockerBridgeCidr:
            type: string
            description: A CIDR notation IP for Docker bridge.
  layout: 
    type: object
    properties: 
      id: 
        type: integer
        format: int64
        description: The Layout ID for the host type(s) that will be provisioned for the cluster
  server: 
    $ref: clusterServerCreate.yaml
  autoRecoverPowerState:
    type: boolean
    description: Automatically Power on VMs
    default: false
  taskSetId:
    type: integer
    format: int64
    description: Optional Workflow Id desired to be run
