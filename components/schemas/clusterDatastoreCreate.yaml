type: object
properties:
  name:
    type: string
  datastoreType:
    type: object
    properties:
      id:
        type: integer
        format: int64
  storageServer:
    type: object
    properties:
      id:
        type: integer
        format: int64
  visibility:
    type: string
  active:
    type: boolean
  defaultStore:
    type: boolean
  config:
    anyOf:
      - $ref: clusterDatastoreConfigNFS.yaml
      - $ref: clusterDatastoreConfigGFS2.yaml
      - $ref: storageDatastoreConfigGeneric.yaml
      - $ref: storageDatastoreConfigAlletraMPHVM.yaml
  tenants:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        defaultStore:
          type: boolean
        defaultTarget:
          type: boolean
  resourcePermissions:
    type: object
    properties:
      allGroups:
        type: boolean
      defaultStore:
        type: boolean
      allPlans:
        type: boolean
      defaultTarget:
        type: boolean
      morpheusResourceType:
        type: string
      morpheusResourceId:
        type: integer
        format: int64
      canManage:
        type: boolean
      all:
        type: boolean
      account:
        type: object
        properties:
          id:
            type: integer
            format: int64
      sites:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              format: int64
      plans:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            code:
              type: string
  datastores:
    type: array
    items:
      type: object
  heartbeatTarget: 
    type: boolean
    description: Heartbeat Target
  supportsVmSecureMetadata:
    type: boolean
    description: >
      When `true`, designates this datastore to hold NVRAM and swtpm state for
      TPM/SecureBoot VMs in the cluster, enabling live migration and HA
      failover. Only one datastore per cluster scope may be designated at a
      time; setting this to `true` automatically clears the flag on any
      previously designated datastore. Only applicable to GFS2 and NFS
      datastore types.

