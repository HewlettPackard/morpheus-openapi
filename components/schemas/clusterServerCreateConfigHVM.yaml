description: Configuration for HVM cluster servers
type: object
properties:
  cpuArch:
    type: string
  cpuModel:
    type: string
  dynamicPlacementMode:
    description: When enabled, Dynamic Placement will automatically balance VMs across cluster hosts based on resource utilization. When disabled, VMs will only migrate to a new host if they are pinned to a specific host or failed over and not running on the preferred host.
    type: string
    enum:
      - on
      - off
  powerPolicy:
    type: string
    enum:
    - balanced
    - performance
  vcpuPlacementMode:
    type: string
    enum:
    - unmanaged
    - auto
  storageInterfaceName:
    type: string
  computeInterfaceName:
    type: string
  computeVlans:
    type: string
  overlayInterfaceName:
    type: string
  createUser:
    type: boolean
