description: |
  Common properties shared by all monitoring check create payload schemas.
  These are the standard fields every check type accepts when creating a new check.

type: object
properties:
  name:
    type: string
    description: Unique name scoped to your account for the check
    example: My Check
  description:
    type:
      - string
      - 'null'
    description: Optional description field
    example: This is my awesome check
  checkInterval:
    type: integer
    description: Number of milliseconds you want between check executions (minimum is 1 minute, depending on your subscription plan)
    default: 300000
  inUptime:
    type: boolean
    description: Used to determine if check should affect account wide availability calculations
    default: true
  active:
    type: boolean
    description: Used to determine if check should be scheduled to execute
    default: true
  severity:
    type: string
    description: Severity level threshold for sending notifications.
    default: critical
    enum:
      - info
      - warning
      - critical
required:
  - name

