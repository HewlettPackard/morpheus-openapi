type: object
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
    description: The name of the system.
    example: my-system
  description:
    type: string
    description: Optional description for the system.
    example: My system description
  type:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      code:
        type: string
  layout:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      code:
        type: string
  status:
    type: string
    description: The current status of the system.
    example: ok
    enum:
      - ok
      - uninitialized
      - failed
      - warning
      - error
  statusMessage:
    type:
      - string
      - "null"
    description: A message describing the current status.
  enabled:
    type: boolean
    description: Whether the system is enabled.
    example: true
  externalId:
    type: string
    description: External ID of the system.
    example: ext-1234
  config:
    type: object
    description: Arbitrary configuration data for the system.
    additionalProperties: true
  components:
    type: array
    description: Component instances belonging to this system.
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: object
          properties:
            id:
              type: integer
              format: int64
            code:
              type: string
            name:
              type: string
        status:
          type: string
          example: ok
        externalId:
          type:
            - string
            - "null"
        config:
          type:
            - object
            - "null"
          additionalProperties: true
  dateCreated:
    type: string
    format: date-time
    description: The date the system was created.
  lastUpdated:
    type: string
    format: date-time
    description: The date the system was last updated.
