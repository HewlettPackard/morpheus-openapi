type: object
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
  description:
    type:
      - string
      - 'null'
  labels:
    type: array
    items:
      type: string
  ownerId:
    type: integer
    format: int64
  tenant:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  imageType:
    type: string
  userUploaded:
    type: boolean
  userDefined:
    type: boolean
  systemImage:
    type: boolean
  isCloudInit:
    type: boolean
  sshUsername:
    type:
      - string
      - 'null'
  sshPassword:
    type:
      - string
      - 'null'
  sshPasswordHash:
    type:
      - string
      - 'null'
  sshKey:
    type:
      - string
      - 'null'
  osType:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      code:
        type: string
      name:
        type: string
      description:
        type:
          - string
          - 'null'
      vendor:
        type: string
      category:
        type: string
      osFamily:
        type: string
      osVersion:
        type: string
      bitCount:
        type: integer
        format: int64
      platform:
        type: string
  minRam:
    type:
      - integer
      - 'null'
    format: int64
  minRamGB:
    type:
      - number
      - 'null'
    format: double
  minDisk:
    type:
      - integer
      - 'null'
    format: int64
  minDiskGB:
    type:
      - string
      - 'null'
  rawSize:
    type:
      - integer
      - 'null'
    format: int64
  rawSizeGB:
    type:
      - number
      - 'null'
  trialVersion:
    type: boolean
  virtioSupported:
    type: boolean
  uefi:
    description: UEFI enabled?
    type:
      - boolean
      - 'null'
  isAutoJoinDomain:
    type: boolean
  vmToolsInstalled:
    type: boolean
  installAgent:
    type: boolean
  isForceCustomization:
    type: boolean
  isSysprep:
    type: boolean
  fipsEnabled:
    type: boolean
  userData:
    type:
      - string
      - 'null'
  consoleKeymap:
    type:
      - string
      - 'null'
  storageProvider:
    type:
      - object
      - 'null'
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  externalId:
    type:
      - string
      - 'null'
  visibility:
    type: string
    enum:
      - "private"
      - "public"
  accounts:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
  config:
    description: Map of configuration properties, varies by image type.
    oneOf:
      - type: object
        title: Azure Reference Virtual Image Configuration
        description: Azure Reference Virtual Image Parameters
        required:
          - publisher
          - offer
          - sku
          - version
        properties:
          publisher:
            type: string
            description: The name of the publisher in the Azure Marketplace
          offer:
            type: string
            description: The name of the offer in the Azure Marketplace
          sku:
            type: string
            description: The name of the sku in the Azure Marketplace
          version:
            type: string
            description: The name of the version in the Azure Marketplace
      - type: object
    properties:
      memorySizeType:
        type: string
  volumes:
    type: array
    items:
      type: object
  storageControllers:
    type: array
    items:
      type: object
  networkInterfaces:
    type: array
    items:
      type: object
  tags:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
  locations:
    type: array
    items:
      type: object
  dateCreated:
    type: string
    format: date-time
  lastUpdated:
    type: string
    format: date-time
  status:
    type: string
