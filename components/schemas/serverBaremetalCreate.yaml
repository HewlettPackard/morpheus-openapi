type: object
properties: 
  server:
    type: object
    properties:
      cloud:
        type: object
        properties:
          id:
            type: integer
            example: 34
      computeServerType:
        type: object
        anyOf:
          - type: object
            properties:
              code:
                type: string
                description: The ComputeServerType's code
                example: "IloBareMetalUnmanaged"
          - type: object
            properties:
              id:
                type: integer
                description: The ComputeServerType's id
                example: 1
      description:
        type: string
        example: ""
      group:
        type: object
        properties:
          id:
            type: integer
            example: 2
      labels:
        type: array
        items:
          type: string
        example: []
      name:
        type: string
        example: example
      visibility:
        type: string
        enum:
          - private
          - public
        example: private
      config:
        type: object
        properties:
          iloIpAddress:
            type: string
            format: ipv4
            example: 192.168.1.1
          iloUsername:
            type: string
            example: ""
          iloPassword:
            type: string
            example: ""
          macAddress:
            type: string
            example: "ba:dc:0f:fe:ca:fe"
          resourcePoolId:
            type: integer
            example: 12
          preProvisioned:
            type: boolean
            description: Set to 'true' if the server is pre-provisioned (brownfield)
            example: false
          windowsOS:
            type: boolean
            description: Set to 'true' if preProvisioned is 'true' and the server has a Windows OS installed
            example: false
          osIpAddress:
            type: string
            description: The IP address of the OS installed on the server. Required if preProvisioned is 'true'.
            format: ipv4
            example: 192.168.1.1
          osUsername:
            type: string
            description: The username to access the OS installed on the server. Required if preProvisioned is 'true'.
            example: ""
          osPassword:
            type: string
            description: The password to access the OS installed on the server. Required if preProvisioned is 'true'.
            example: ""
          osSSHKeyId:
            type: integer
            description: |
              ID of the SSH Key Pair needed to access the OS installed on the server.
              Required if preProvisioned is 'true' and the OS is Linux and password authentication is disabled.
            example: 5

