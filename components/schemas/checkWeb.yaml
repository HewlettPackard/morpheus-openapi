title: Web Check
description: |
  Web check type allows you to perform a standard web request and validate the response came back successfully.  Additionally, you can check for matching text within the result.
allOf:
  - $ref: checkCreateCommon.yaml
  - type: object
    properties:
      checkType:
        type: object
        description: Check type you want to create
        properties:
          code:
            type: string
            enum:
              - webGetCheck
      config:
        allOf:
          - $ref: checkWebConfig.yaml
          - $ref: checkSshConfig.yaml

