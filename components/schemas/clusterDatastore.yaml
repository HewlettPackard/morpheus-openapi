type: object
properties:
  id:
    type: integer
    format: int64
  name:
    type: string
  code:
    type:
      - string
      - 'null'
  datastoreType:
    type: object
    properties:
      id:
        type: integer
        format: int64
  storageServer:
    type: object
    properties:
      id:
        type: integer
        format: int64
  type:
    type: string
  visibility:
    type: string
  storageSize:
    type:
      - integer
      - 'null'
    format: int64
  freeSpace:
    type:
      - integer
      - 'null'
    format: int64
  drsEnabled:
    type: boolean
  active:
    type: boolean
  allowWrite:
    type: boolean
  defaultStore:
    type: boolean
  online:
    type: boolean
  allowRead:
    type: boolean
  allowProvision:
    type: boolean
  heartbeatTarget:
    type: boolean
    description: Heartbeat Target
  supportsVmSecureMetadata:
    type: boolean
    description: >
      When `true`, this datastore is designated to hold NVRAM and swtpm state
      for TPM/SecureBoot VMs in the cluster, enabling live migration and HA
      failover. Only one datastore per cluster scope may have this set to
      `true`. Only applicable to GFS2 and NFS datastore types.
  refType:
    type: string
  refId:
    type: integer
    format: int64
  externalId:
    type: string
  zone:
    type: object
    properties:
      id:
        type: integer
        format: int64
  zonePool:
    type: object
    properties:
      id:
        type: integer
        format: int64
  owner:
    type: object
    properties:
      id:
        type: integer
        format: int64
  tenants:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        defaultStore:
          type: boolean
        defaultTarget:
          type: boolean
  resourcePermissions:
    type: object
    properties:
      allGroups:
        type: boolean
      defaultStore:
        type: boolean
      allPlans:
        type: boolean
      defaultTarget:
        type: boolean
      morpheusResourceType:
        type: string
      morpheusResourceId:
        type: integer
        format: int64
      canManage:
        type: boolean
      all:
        type: boolean
      account:
        type: object
        properties:
          id:
            type: integer
            format: int64
      sites:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            default:
              type: boolean
      plans:
        type: array
        items:
          type: object
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
            default:
              type: boolean
  datastores:
    type: array
    items:
      type: object