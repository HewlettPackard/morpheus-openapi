type: object
properties:
  approvalItem:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      externalId:
        type:
          - string
          - 'null'
      externalName:
        type:
          - string
          - 'null'
      internalId:
        type:
          - string
          - 'null'
      approvedBy:
        type: string
      deniedBy:
        type:
          - string
          - 'null'
      status:
        type: string
      errorMessage:
        type:
          - string
          - 'null'
      dateCreated:
        type: string
        format: date-time
      lastUpdated:
        type: string
        format: date-time
      dateApproved:
        type: string
        format: date-time
      dateDenied:
        type:
          - string
          - 'null'
        format: date-time
      approval:
        type: object
        properties:
          id:
            type: integer
            format: int64
      reference:
        type: object
        properties:
          id:
            type: integer
            format: int64
          type:
            type: string
          name:
            type: string
          displayName:
            type: string
      details:
        type:
          - array
          - 'null'
        description: |
          List of request change details associated with the approval item.
          Only present when the approval is for a reconfigure request.
        items:
          type: object
          properties:
            category:
              type: string
              description: The category of the change (e.g. network, volume, plan, planMemory, planCores)
            type:
              type: string
              description: The type of change (e.g. increase, decrease, add, remove, change)
            name:
              type: string
              description: The name of the item being changed
            fromValue:
              type:
                - string
                - 'null'
              description: The original value before the change
            toValue:
              type:
                - string
                - 'null'
              description: The new value after the change
