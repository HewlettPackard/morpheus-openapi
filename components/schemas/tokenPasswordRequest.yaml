title: Get Token Request (Username and Password)
type: object
required:
  - client_id
  - grant_type
  - scope
  - username
  - password
properties:
  client_id:
    type: string
    description: Client ID
    default: morph-api
  grant_type:
    type: string
    description: OAuth Grant Type, use `password`.
    enum:
      - password
    default: password
  scope:
    type: string
    description: OAuth token scope, use `write`.
    enum:
      - write
  username:
    type: string
    description: |
      Username
      Sub-tenant users must format their username as `subdomain\username` with a prefix that is the tenant subdomain or id by default.
  password:
    type: string
    description: Password
    format: password