title: SNMP Check
description: |
  SNMP check performs an SNMP get request to a network entity and validates the data returned matches the expected value.
allOf:
  - $ref: checkCreateCommon.yaml
  - type: object
    properties:
      name:
        example: My SNMP Check  # override example only
      checkType:
        type: object
        description: Check type you want to create
        properties:
          code:
            type: string
            enum:
              - snmpCheck
      config:
        allOf:
          - $ref: checkSNMPConfig.yaml
          - $ref: checkSshConfig.yaml

