type: object
required:
  - network
title: Instances Network Interfaces
properties:
  network:
    type: object
    required:
      - id
    properties:
      id:
        type: string
        description: id of the network to be used. A network group can be specified instead by prefixing its ID with `networkGroup-`.
      pool:
        type: object
        properties:
          id:
            type: integer
            format: int64
            description: id of the ip pool to be used with this network
  networkInterfaceTypeId:
    type: integer
    format: int64
    description: The id of type of the network interface.
  ipMode:
    type: string
    description: The mode for determining ip address. Can be 'static', 'dhcp' or empty string.
    enum:
      - ""
      - static
      - dhcp
    default: dhcp
  ipAddress:
    type: string
    description: The ip address. Not applicable when using DHCP or IP Pools.
  macAddress:
    type: string
    description: The MAC address.
  id:
    type: integer
    format: int64
    description: The interface id. Applicable when resizing and you want to identify an interface to update that already exists.
  networkInterfaces:
    type: array
    title: Instances Child Virtual Network Interfaces
    description: |
      The nested networkInterfaces can be used to define child virtual network interfaces.
      The Options API `/api/options/zoneNetworkOptions?zoneId=5&provisionTypeId=10` can be used to see which types support this (`hasVirtualInvirtualInterfaces = true` and list of available `virtualInterfaces` will be defined.
    items:
      type: object
      required:
        - network
      properties:
        network:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              description: id of the network to be used. A network group can be specified instead by prefixing its ID with `networkGroup-`.
            pool:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
                  description: id of the ip pool to be used with this network
        networkInterfaceTypeId:
          type: integer
          format: int64
          description: The id of type of the network interface.
        ipMode:
          type: string
          description: The mode for determining ip address. Can be 'static', 'dhcp' or empty string.
          enum:
            - ""
            - static
            - dhcp
          default: dhcp
        ipAddress:
          type: string
          description: The ip address. Not applicable when using DHCP or IP Pools.
        macAddress:
          type: string
          description: The MAC address.
        id:
          type: integer
          format: int64
          description: The interface id. Applicable when resizing and you want to identify an interface to update that already exists.
