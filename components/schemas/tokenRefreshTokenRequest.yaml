title: Get Token Request (Refresh Token)
type: object
required:
  - client_id
  - grant_type
  - refresh_token
properties:
  client_id:
    type: string
    description: Client ID
    default: morph-api
  grant_type:
    type: string
    description: OAuth Grant Type, use `refresh_token`.
    enum:
      - refresh_token
    default: refresh_token
  refresh_token:
    type: string
    description: Refresh Token
    format: password